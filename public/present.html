<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dynarisk Training — Live Presentation</title>
<script src="/socket.io/socket.io.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#f5c518;--gold2:#e8a000;--bg:#05051a;--card:rgba(255,255,255,0.05);
  --border:rgba(255,255,255,0.1);--text:#e8e8e8;--dim:#777;
  --green:#27ae60;--red:#c0392b;--blue:#3498db;
}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:'Segoe UI',Arial,sans-serif;overflow:hidden;
  background:radial-gradient(ellipse at 50% 0%,#0d0d35 0%,var(--bg) 70%)}

#slide{
  position:fixed;top:0;left:0;right:0;bottom:44px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 80px;overflow:hidden;
}
.slide-anim{animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── BOTTOM BAR ── */
#bottom{
  position:fixed;bottom:0;left:0;right:0;height:44px;
  display:flex;align-items:center;padding:0 14px;gap:10px;
  background:rgba(0,0,0,0.6);border-top:1px solid rgba(255,255,255,0.07)
}
#progress{flex:1;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden}
#progress-fill{height:100%;background:var(--gold);transition:width .4s ease}
#slide-info{color:var(--dim);font-size:13px;white-space:nowrap;min-width:60px;text-align:right}
.nav-btn{
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);
  border-radius:6px;padding:4px 12px;color:var(--dim);cursor:pointer;
  font-size:13px;transition:.15s;line-height:1.6
}
.nav-btn:hover{background:rgba(255,255,255,0.12);color:var(--text)}
.nav-btn:disabled{opacity:.25;cursor:not-allowed}
#conn-dot{width:8px;height:8px;border-radius:50%;background:#333;flex-shrink:0;transition:.3s}
#conn-dot.online{background:#27ae60}

/* ── HINT ── */
#hint{
  position:fixed;top:12px;right:14px;
  font-size:12px;color:rgba(255,255,255,0.2);letter-spacing:1px;
  pointer-events:none;transition:opacity 2s;
}

/* ════════════════════════════════════════
   COVER
════════════════════════════════════════ */
.s-cover{display:flex;flex-direction:column;align-items:center;gap:16px;text-align:center;max-width:960px}
.s-cover .c-emoji{font-size:80px;line-height:1}
.s-cover h1{
  font-size:clamp(34px,5vw,60px);font-weight:900;line-height:1.1;
  background:linear-gradient(135deg,var(--gold),#ff9500,var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text
}
.s-cover .c-sub{font-size:clamp(18px,2.8vw,30px);color:var(--text);font-weight:300}
.s-cover .c-tag{font-size:clamp(15px,2vw,22px);color:var(--dim);font-style:italic;margin-top:4px}
.s-cover .c-meta{font-size:15px;color:var(--dim);letter-spacing:3px;margin-top:14px;text-transform:uppercase}

/* ════════════════════════════════════════
   SECTION BREAK
════════════════════════════════════════ */
.s-section{display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center}
.s-section .sec-emoji{font-size:80px;line-height:1}
.s-section .sec-num{font-size:13px;letter-spacing:4px;color:var(--dim);text-transform:uppercase}
.s-section h2{font-size:clamp(34px,5vw,62px);font-weight:900;color:var(--gold)}
.s-section .sec-time{font-size:17px;color:var(--dim);letter-spacing:2px}
.s-section .sec-sub{
  font-size:clamp(18px,2.5vw,26px);color:var(--text);margin-top:10px;
  background:rgba(245,197,24,0.1);border:1px solid rgba(245,197,24,0.3);
  border-radius:50px;padding:8px 28px;
}

/* ════════════════════════════════════════
   GENERIC CONTENT WRAPPER
════════════════════════════════════════ */
.s-content{display:flex;flex-direction:column;gap:16px;width:100%;max-width:1100px}
.slide-title{font-size:clamp(22px,3vw,38px);font-weight:800;color:var(--gold)}

/* ════════════════════════════════════════
   TABLE
════════════════════════════════════════ */
.slide-table{width:100%;border-collapse:collapse;font-size:clamp(14px,1.7vw,19px)}
.slide-table th{
  background:rgba(245,197,24,0.12);color:var(--gold);
  padding:10px 16px;text-align:left;font-size:12px;letter-spacing:1px;text-transform:uppercase;
  border-bottom:2px solid rgba(245,197,24,0.3)
}
.slide-table td{padding:11px 16px;border-bottom:1px solid rgba(255,255,255,0.06);vertical-align:top}
.slide-table tr:last-child td{border-bottom:none}
.table-footer{
  margin-top:10px;padding:10px 16px;
  background:rgba(245,197,24,0.08);border-left:3px solid var(--gold);
  border-radius:0 8px 8px 0;font-size:clamp(14px,1.6vw,17px);color:var(--gold);font-weight:600
}

/* ════════════════════════════════════════
   BULLETS
════════════════════════════════════════ */
.bullet-list{list-style:none;display:flex;flex-direction:column;gap:10px;width:100%}
.bullet-item{
  display:flex;align-items:flex-start;gap:14px;
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
  border-radius:12px;padding:12px 16px
}
.b-emoji{font-size:26px;flex-shrink:0;line-height:1.3}
.b-label{font-size:clamp(15px,1.8vw,19px);font-weight:700;color:#fff;margin-bottom:2px}
.b-text{font-size:clamp(13px,1.5vw,16px);color:var(--dim);line-height:1.5}

/* ════════════════════════════════════════
   STORY / SCENARIO
════════════════════════════════════════ */
.s-story{display:flex;flex-direction:column;gap:16px;width:100%;max-width:1000px}
.story-header{display:flex;align-items:center;gap:14px}
.story-emoji{font-size:48px}
.story-label{font-size:clamp(20px,2.5vw,28px);font-weight:800;color:var(--gold)}
.story-hook{
  font-size:clamp(14px,1.7vw,18px);color:var(--dim);
  padding:10px 16px;border-left:3px solid var(--gold);
  background:rgba(245,197,24,0.06);border-radius:0 8px 8px 0
}
.story-scenario{
  font-size:clamp(15px,1.8vw,20px);line-height:1.7;color:var(--text);
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);
  border-radius:12px;padding:18px 22px;font-style:italic
}
.story-key{
  font-size:clamp(15px,1.8vw,19px);font-weight:700;
  background:rgba(39,174,96,0.12);border:1px solid rgba(39,174,96,0.3);
  border-radius:10px;padding:12px 16px;color:#4dcc78
}

/* ════════════════════════════════════════
   QUOTE
════════════════════════════════════════ */
.s-quote{display:flex;flex-direction:column;gap:22px;max-width:960px}
.quote-text{
  font-size:clamp(20px,2.8vw,34px);line-height:1.55;font-style:italic;color:#fff;
  border-left:5px solid var(--gold);padding:18px 28px;
  background:rgba(245,197,24,0.06);border-radius:0 12px 12px 0
}
.quote-followup{font-size:clamp(15px,1.9vw,22px);color:var(--text);line-height:1.65}
.quote-cta{font-size:clamp(17px,2.1vw,26px);font-weight:700;color:var(--gold)}

/* ════════════════════════════════════════
   QUESTION / DISCUSSION
════════════════════════════════════════ */
.s-question{display:flex;flex-direction:column;gap:22px;max-width:900px;text-align:center;width:100%}
.question-box{
  font-size:clamp(18px,2.4vw,30px);font-style:italic;color:#fff;
  background:rgba(245,197,24,0.08);border:1px solid rgba(245,197,24,0.3);
  border-radius:16px;padding:26px 34px;line-height:1.5
}
.answer-box{
  background:rgba(39,174,96,0.09);border:1px solid rgba(39,174,96,0.3);
  border-radius:12px;padding:16px 24px;text-align:left
}
.answer-box p{font-size:clamp(15px,1.8vw,21px);color:#4dcc78;line-height:1.8}

/* ════════════════════════════════════════
   MYTH BUSTER
════════════════════════════════════════ */
.s-myth{display:flex;flex-direction:column;gap:14px;width:100%;max-width:1000px}
.myth-box{
  background:rgba(192,57,43,0.1);border:1px solid rgba(192,57,43,0.3);
  border-radius:12px;padding:14px 20px
}
.box-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:5px}
.myth-box .box-label{color:#ff9999}
.reality-box .box-label{color:#4dcc78}
.myth-text{font-size:clamp(16px,1.9vw,22px);color:#ffcdd2;font-style:italic}
.reality-box{
  background:rgba(39,174,96,0.09);border:1px solid rgba(39,174,96,0.3);
  border-radius:12px;padding:14px 20px
}
.reality-text{font-size:clamp(15px,1.8vw,20px);color:var(--text);line-height:1.6}
.insight-box{
  font-size:clamp(14px,1.7vw,19px);color:var(--dim);line-height:1.7;
  border-left:3px solid var(--gold);padding:10px 16px
}
.myth-closing{font-size:clamp(17px,2.1vw,26px);font-weight:700;color:var(--gold);text-align:center}

/* ════════════════════════════════════════
   LANGUAGE TABLE
════════════════════════════════════════ */
.lang-table{width:100%;border-collapse:collapse;font-size:clamp(13px,1.6vw,18px)}
.lang-table th{
  padding:10px 14px;font-size:11px;letter-spacing:1px;text-transform:uppercase;border-bottom:2px solid
}
.lang-table th.bad{color:#ff9999;border-color:rgba(192,57,43,0.5);background:rgba(192,57,43,0.08)}
.lang-table th.good{color:#4dcc78;border-color:rgba(39,174,96,0.5);background:rgba(39,174,96,0.08)}
.lang-table td{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,0.06);vertical-align:top}
.lang-table td.bad{color:#ffaaaa;background:rgba(192,57,43,0.04)}
.lang-table td.good{color:#88e8a0;background:rgba(39,174,96,0.04)}
.lang-table tr:last-child td{border-bottom:none}

/* ════════════════════════════════════════
   ALERT
════════════════════════════════════════ */
.s-alert{display:flex;flex-direction:column;align-items:center;gap:14px;width:100%;max-width:900px}
.alert-intro{
  font-size:clamp(17px,2.1vw,26px);font-weight:700;color:#ff9999;text-align:center;
  padding:12px 20px;background:rgba(192,57,43,0.1);border:1px solid rgba(192,57,43,0.35);border-radius:10px;width:100%
}
.alert-signal{
  font-size:clamp(14px,1.7vw,18px);color:var(--dim);font-style:italic;
  padding:10px 16px;border-left:3px solid #e74c3c;width:100%
}
.alert-steps{display:flex;flex-direction:column;gap:9px;width:100%}
.alert-step{
  display:flex;align-items:center;gap:14px;
  background:rgba(255,255,255,0.04);border-radius:10px;padding:11px 15px
}
.step-num{
  width:30px;height:30px;border-radius:50%;flex-shrink:0;
  background:rgba(192,57,43,0.3);border:1px solid rgba(192,57,43,0.5);
  display:flex;align-items:center;justify-content:center;
  font-weight:800;color:#ff9999;font-size:14px
}
.step-text{font-size:clamp(14px,1.7vw,18px);color:var(--text)}
.alert-closing{font-size:clamp(16px,2vw,22px);font-weight:700;color:var(--gold);text-align:center}

/* ════════════════════════════════════════
   URGENCY
════════════════════════════════════════ */
.s-urgency{display:flex;flex-direction:column;gap:16px;width:100%;max-width:900px}
.urgency-q{
  font-size:clamp(17px,2.1vw,26px);color:#fff;font-weight:700;text-align:center;
  padding:14px 20px;background:rgba(245,197,24,0.08);border:1px solid rgba(245,197,24,0.3);border-radius:10px
}
.check-list{display:flex;flex-direction:column;gap:9px}
.check-item{
  display:flex;align-items:center;gap:12px;font-size:clamp(15px,1.8vw,20px);
  background:rgba(255,255,255,0.04);border-radius:10px;padding:13px 17px;
  border:1px solid rgba(255,255,255,0.07)
}
.check-icon{font-size:20px;flex-shrink:0}
.urgency-action{
  font-size:clamp(16px,1.9vw,23px);font-weight:800;color:#ff9999;text-align:center;
  padding:13px;background:rgba(192,57,43,0.12);border:1px solid rgba(192,57,43,0.4);border-radius:10px
}

/* ════════════════════════════════════════
   PAYMENT TABLE
════════════════════════════════════════ */
.payment-table{width:100%;border-collapse:collapse;font-size:clamp(13px,1.6vw,18px)}
.payment-table th{
  background:rgba(245,197,24,0.1);color:var(--gold);
  padding:9px 14px;text-align:left;font-size:11px;letter-spacing:1px;text-transform:uppercase;
  border-bottom:2px solid rgba(245,197,24,0.3)
}
.payment-table td{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,0.06);vertical-align:middle}
.payment-table tr:last-child td{border-bottom:none}
.s-strongest{color:#27ae60;font-weight:800}.s-strong{color:#4dcc78;font-weight:700}
.s-moderate{color:var(--gold);font-weight:600}.s-low{color:#ff9999;font-weight:600}
.payment-note{
  margin-top:10px;font-size:clamp(13px,1.5vw,16px);color:var(--dim);
  padding:9px 14px;border-left:3px solid var(--dim);background:rgba(255,255,255,0.03);border-radius:0 8px 8px 0
}

/* ════════════════════════════════════════
   WARNING / SIGNALS
════════════════════════════════════════ */
.signal-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;width:100%}
.signal-item{
  display:flex;align-items:flex-start;gap:9px;
  background:rgba(192,57,43,0.07);border:1px solid rgba(192,57,43,0.2);
  border-radius:9px;padding:11px 13px;font-size:clamp(13px,1.5vw,17px);line-height:1.4
}
.response-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:7px;margin-top:4px}
.response-items{display:flex;flex-direction:column;gap:7px}
.response-item{
  font-size:clamp(13px,1.5vw,17px);color:#88e8a0;font-style:italic;
  padding:9px 13px;background:rgba(39,174,96,0.06);border-radius:7px;
  border-left:3px solid rgba(39,174,96,0.4)
}

/* ════════════════════════════════════════
   TAKEAWAYS
════════════════════════════════════════ */
.takeaway-list{display:flex;flex-direction:column;gap:10px;width:100%;max-width:900px}
.takeaway-item{
  display:flex;align-items:flex-start;gap:15px;
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
  border-radius:12px;padding:12px 16px
}
.takeaway-num{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  display:flex;align-items:center;justify-content:center;
  font-weight:900;color:#000;font-size:17px
}
.takeaway-text{font-size:clamp(15px,1.8vw,20px);color:var(--text);line-height:1.5;padding-top:5px}

/* ════════════════════════════════════════
   CLOSING
════════════════════════════════════════ */
.s-closing{display:flex;flex-direction:column;align-items:center;gap:22px;max-width:900px;text-align:center}
.closing-quote{
  font-size:clamp(20px,2.7vw,36px);line-height:1.55;font-style:italic;color:#fff;
  padding:22px 34px;background:rgba(245,197,24,0.06);
  border-left:5px solid var(--gold);border-radius:0 16px 16px 0;text-align:left
}
.closing-sub{font-size:clamp(15px,1.9vw,23px);color:var(--dim);line-height:1.65}
.closing-credit{font-size:13px;color:var(--dim);letter-spacing:1px;opacity:0.5}

/* ════════════════════════════════════════
   REFERENCE
════════════════════════════════════════ */
.ref-table{width:100%;max-width:900px;border-collapse:collapse;font-size:clamp(14px,1.7vw,19px)}
.ref-table td{padding:11px 16px;border-bottom:1px solid rgba(255,255,255,0.07);vertical-align:middle}
.ref-table tr:last-child td{border-bottom:none}
.ref-table td:first-child{color:var(--gold);font-weight:600;width:42%}
.ref-table td:last-child{color:var(--text);font-family:monospace;font-size:.9em}
</style>
</head>
<body>

<div id="slide"></div>

<div id="bottom">
  <button class="nav-btn" id="btn-prev" onclick="go(-1)">◀</button>
  <div id="progress"><div id="progress-fill" style="width:0%"></div></div>
  <div id="slide-info">1 / 25</div>
  <button class="nav-btn" id="btn-next" onclick="go(1)">▶</button>
  <div id="conn-dot"></div>
</div>

<div id="hint">← → to navigate</div>

<script>
// ─── SLIDES DATA ──────────────────────────────────────────────────────────────
const SLIDES = [

  { type:'table', title:'🗂 Session Overview',

      ['⚙️ Part 3: Know the Process','10 min','What to do, step by step'],

      ['🎯 Wrap-Up & Key Takeaways','5 min','What to remember on Monday'],

  { type:'section', number:'01', emoji:'🚀', label:'Welcome & Ice Breaker', time:'5 minutes' },

  { type:'section', number:'02', emoji:'📖', label:'Know the Scam', time:'15 minutes' },

      { emoji:'📧', label:'Business Email Compromise', text:'Intercepted invoices with swapped bank details' },
      { emoji:'🖥️', label:'Account Takeover', text:'Unauthorised access — different legal rules apply entirely' },
    ]},

  // 7 — Impersonation story
  { type:'story', emoji:'🏦', label:'Impersonation Scam',

    keyFact:'🔑 Banks NEVER ask you to move money to a safe account. Full stop.' },

  // 8 — Romance story
  { type:'story', emoji:'💘', label:'Romance Scam',

  // 9 — Investment fraud story
  { type:'story', emoji:'📈', label:'Investment Fraud / "Pig Butchering"',

    keyFact:'🔑 Average loss: ~£18,500. Victims often don\'t accept it\'s a scam — they may keep paying "fees."' },

  // 10 — Other scam types
  { type:'bullets', title:'More Scam Types to Know',
    items:[
      { emoji:'🛒', label:'Purchase Scams', text:'Most common by volume · Especially affects 18–34 year olds · Seller insists on bank transfer instead of PayPal · Lower individual losses but high emotional impact' },
      { emoji:'📧', label:'Business Email Compromise', text:'Criminal swaps bank details on an invoice · Looks identical to the real email thread · Example: £85,000 property transaction intercepted' },
      { emoji:'🖥️', label:'Account Takeover (Unauthorised)', text:'Victim did NOT authorise the payment · Very strong legal protections · Do NOT treat the same as APP fraud — different process entirely' },
    ]},

  // 11 — Quick check

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ─── RENDER ──────────────────────────────────────────────────────────────────
function renderSlide(s) {
  switch(s.type) {
    case 'cover':     return renderCover(s);
    case 'section':   return renderSection(s);
    case 'table':     return renderTable(s);
    case 'quote':     return renderQuote(s);
    case 'bullets':   return renderBullets(s);
    case 'story':     return renderStory(s);
    case 'question':  return renderQuestion(s);
    case 'myth':      return renderMyth(s);
    case 'language':  return renderLanguage(s);
    case 'alert':     return renderAlert(s);
    case 'urgency':   return renderUrgency(s);
    case 'payment':   return renderPayment(s);
    case 'warning':   return renderWarning(s);
    case 'takeaways': return renderTakeaways(s);
    case 'closing':   return renderClosing(s);
    case 'reference': return renderReference(s);
    default: return `<div class="s-content"><div class="slide-title">${esc(s.title||'')}</div></div>`;
  }
}

function renderCover(s) {
  return `<div class="s-cover slide-anim">
    <div class="c-emoji">${s.emoji}</div>
    <h1>${esc(s.title)}</h1>
    <div class="c-sub">${esc(s.subtitle)}</div>
    <div class="c-tag">${esc(s.tagline)}</div>
    <div class="c-meta">${esc(s.meta)}</div>
  </div>`;
}

function renderSection(s) {
  return `<div class="s-section slide-anim">
    <div class="sec-emoji">${s.emoji}</div>
    <div class="sec-num">Segment ${esc(s.number)}</div>
    <h2>${esc(s.label)}</h2>
    <div class="sec-time">${esc(s.time)}</div>
    ${s.sub ? `<div class="sec-sub">${esc(s.sub)}</div>` : ''}
  </div>`;
}

function renderTable(s) {
  return `<div class="s-content slide-anim">
    <div class="slide-title">${esc(s.title)}</div>
    <table class="slide-table">
      <thead><tr>${s.headers.map(h=>`<th>${esc(h)}</th>`).join('')}</tr></thead>
      <tbody>${s.rows.map(row=>`<tr>${row.map(c=>`<td>${esc(c)}</td>`).join('')}</tr>`).join('')}</tbody>
    </table>
    ${s.footer ? `<div class="table-footer">${esc(s.footer)}</div>` : ''}
  </div>`;
}

function renderQuote(s) {
  return `<div class="s-quote slide-anim">
    <div class="quote-text">${esc(s.quote)}</div>
    <div class="quote-followup">${esc(s.followup)}</div>
    <div class="quote-cta">${esc(s.cta)}</div>
  </div>`;
}

function renderBullets(s) {
  return `<div class="s-content slide-anim">
    <div class="slide-title">${esc(s.title)}</div>
    <ul class="bullet-list">
      ${s.items.map(it=>`<li class="bullet-item">
        <div class="b-emoji">${it.emoji}</div>
        <div><div class="b-label">${esc(it.label)}</div><div class="b-text">${esc(it.text)}</div></div>
      </li>`).join('')}
    </ul>
  </div>`;
}

function renderStory(s) {
  return `<div class="s-story slide-anim">
    <div class="story-header">

    <div class="story-scenario">"${esc(s.scenario)}"</div>

function renderQuestion(s) {

function renderMyth(s) {

function renderTakeaways(s) {

    <div class="slide-title" style="text-align:center">${esc(s.title)}</div>
    <div class="takeaway-list">
      ${s.items.map((item,i)=>`<div class="takeaway-item">

function renderClosing(s) {
  return `<div class="s-closing slide-anim">
    <div class="closing-quote">${esc(s.quote)}</div>
    <div class="closing-sub">${esc(s.sub)}</div>
    <div class="closing-credit">${esc(s.credit)}</div>
  </div>`;
}

function renderReference(s) {
  return `<div class="s-content slide-anim" style="align-items:center">
    <div class="slide-title" style="text-align:center">${esc(s.title)}</div>
    <table class="ref-table">
      <tbody>${s.rows.map(row=>`<tr><td>${esc(row[0])}</td><td>${esc(row[1])}</td></tr>`).join('')}</tbody>
    </table>
  </div>`;
}

// ─── STATE & NAVIGATION ───────────────────────────────────────────────────────
let currentIndex = 0;
const total = SLIDES.length;

function show(index) {
  currentIndex = Math.max(0, Math.min(total - 1, index));
  document.getElementById('slide').innerHTML = renderSlide(SLIDES[currentIndex]);
  document.getElementById('slide-info').textContent = `${currentIndex + 1} / ${total}`;
  document.getElementById('progress-fill').style.width = `${((currentIndex + 1) / total) * 100}%`;
  document.getElementById('btn-prev').disabled = currentIndex === 0;
  document.getElementById('btn-next').disabled = currentIndex === total - 1;
}

function go(delta) {
  const newIndex = Math.max(0, Math.min(total - 1, currentIndex + delta));
  if (newIndex === currentIndex) return;
  socket.emit('present_nav', { index: newIndex });
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') go(1);
  if (e.key === 'ArrowLeft') go(-1);
});

// ─── SOCKET ──────────────────────────────────────────────────────────────────
const socket = io();
const dot = document.getElementById('conn-dot');

socket.on('connect', () => {
  dot.classList.add('online');
  socket.emit('present_connect');
});

socket.on('disconnect', () => dot.classList.remove('online'));

socket.on('slide', ({ index }) => show(index));

socket.on('reset', () => show(0));

// ─── INIT ─────────────────────────────────────────────────────────────────────
show(0);

// Fade hint after 4 seconds
setTimeout(() => { document.getElementById('hint').style.opacity = '0'; }, 4000);
</script>
